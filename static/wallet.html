<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZCASH TESTNET WALLET — Orchard/Halo2</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "JetBrains Mono", "SF Mono", "Fira Code", monospace;
        background: #08080f;
        color: #e0e0e0;
        height: 100vh;
        overflow: hidden;
        font-size: 14px;
      }

      /* ── Scanline Overlay ── */
      body::after {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.03) 2px,
          rgba(0, 0, 0, 0.03) 4px
        );
        pointer-events: none;
        z-index: 9999;
      }

      /* ── Matrix Rain Background ── */
      .matrix-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        pointer-events: none;
      }

      /* ── Navbar ── */
      .navbar {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        padding: 6px 20px;
        border-bottom: 1px solid #1a1a2e;
        background: rgba(8, 8, 15, 0.95);
      }
      .navbar .logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      /* ── Eyes ── */
      .eyes-hero {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;
        padding: 8px 0 2px 0;
        position: relative;
        z-index: 10;
        flex-direction: column;
      }
      .eyes-row {
        display: flex;
        gap: 16px;
        align-items: center;
      }
      .eye {
        width: 56px;
        height: 56px;
        background: radial-gradient(circle, #0d0d18 60%, #08080f 100%);
        border: 2px solid rgba(245, 185, 25, 0.25);
        border-radius: 50%;
        position: relative;
        overflow: hidden;
        box-shadow:
          0 0 20px rgba(245, 185, 25, 0.08),
          inset 0 0 15px rgba(0, 0, 0, 0.6);
      }
      .eye .pupil {
        width: 22px;
        height: 22px;
        background: transparent;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        transition: transform 0.08s ease-out;
        display: flex;
        align-items: center;
        justify-content: center;
        filter: drop-shadow(0 0 10px rgba(245, 185, 25, 0.7));
      }
      .pupil-logo {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        pointer-events: none;
      }
      .surveillance-text {
        font-size: 13px;
        color: #00ff41;
        letter-spacing: 2px;
        text-transform: uppercase;
        opacity: 0.7;
        margin-top: 2px;
      }

      /* ── Glitch Title ── */
      .glitch-title {
        font-size: 13px;
        font-weight: 800;
        color: #f5b919;
        position: relative;
        display: inline-block;
        letter-spacing: 3px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", monospace;
      }
      .glitch-title::before,
      .glitch-title::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
      }
      .glitch-title::before {
        color: #ff006e;
        z-index: -1;
      }
      .glitch-title::after {
        color: #00f5d4;
        z-index: -1;
      }
      .glitch-title.glitching::before {
        animation: glitch-1 0.3s steps(2) forwards;
        opacity: 0.8;
      }
      .glitch-title.glitching::after {
        animation: glitch-2 0.3s steps(2) forwards;
        opacity: 0.8;
      }
      @keyframes glitch-1 {
        0% {
          clip-path: inset(20% 0 60% 0);
          transform: translate(-3px, -1px);
        }
        25% {
          clip-path: inset(50% 0 20% 0);
          transform: translate(3px, 1px);
        }
        50% {
          clip-path: inset(10% 0 70% 0);
          transform: translate(-2px, 2px);
        }
        75% {
          clip-path: inset(60% 0 10% 0);
          transform: translate(2px, -2px);
        }
        100% {
          clip-path: inset(0 0 0 0);
          transform: translate(0);
          opacity: 0;
        }
      }
      @keyframes glitch-2 {
        0% {
          clip-path: inset(60% 0 20% 0);
          transform: translate(3px, 1px);
        }
        25% {
          clip-path: inset(20% 0 50% 0);
          transform: translate(-3px, -1px);
        }
        50% {
          clip-path: inset(70% 0 10% 0);
          transform: translate(2px, -2px);
        }
        75% {
          clip-path: inset(10% 0 60% 0);
          transform: translate(-2px, 2px);
        }
        100% {
          clip-path: inset(0 0 0 0);
          transform: translate(0);
          opacity: 0;
        }
      }

      .navbar .status {
        margin-left: auto;
        font-size: 13px;
        color: #555;
        font-family: "JetBrains Mono", monospace;
      }
      .navbar .status.connected {
        color: #00ff41;
      }
      .navbar .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 4px;
      }
      .navbar .dot.green {
        background: #00ff41;
        box-shadow: 0 0 6px rgba(0, 255, 65, 0.5);
      }
      .navbar .dot.red {
        background: #f87171;
        box-shadow: 0 0 6px rgba(248, 113, 113, 0.5);
      }

      /* ── Main Layout ── */
      .main-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 8px 16px;
        position: relative;
        z-index: 10;
        height: calc(100vh - 130px);
        overflow: hidden;
      }
      .col {
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow: hidden;
      }

      /* ── Card ── */
      .card {
        background: rgba(8, 8, 15, 0.92);
        border: 1px solid #1a1a2e;
        border-radius: 0;
        padding: 12px 14px;
        position: relative;
        overflow: hidden;
        transform-style: preserve-3d;
        transition:
          transform 0.15s ease-out,
          box-shadow 0.15s ease-out,
          border-color 0.3s;
        will-change: transform;
        flex: 1;
        min-height: 0;
      }
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: radial-gradient(
          600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
          rgba(245, 185, 25, 0.02),
          transparent 40%
        );
        pointer-events: none;
        z-index: 0;
      }
      .card:hover {
        border-color: rgba(245, 185, 25, 0.12);
        box-shadow: 0 0 20px rgba(245, 185, 25, 0.03);
      }
      .card > * {
        position: relative;
        z-index: 1;
      }
      .card h2 {
        font-size: 14px;
        color: #666;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 3px;
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        border-left: 2px solid #f5b919;
        padding-left: 8px;
      }

      /* ── Shield Icon ── */
      .shield-container {
        position: fixed;
        bottom: 28px;
        left: 16px;
        z-index: 5;
        display: flex;
        align-items: center;
        gap: 8px;
        pointer-events: none;
      }
      .shield-icon {
        opacity: 0.15;
      }
      .shield-icon svg {
        width: 50px;
        height: 62px;
        filter: drop-shadow(0 0 20px rgba(245, 185, 25, 0.3));
        animation: shield-pulse 4s ease-in-out infinite;
      }
      .zk-proof-label {
        font-size: 14px;
        color: #00ff41;
        letter-spacing: 2px;
        text-transform: uppercase;
        opacity: 0.4;
        font-family: "JetBrains Mono", monospace;
        animation: shield-pulse 4s ease-in-out infinite;
      }
      @keyframes shield-pulse {
        0%,
        100% {
          opacity: 0.15;
          filter: drop-shadow(0 0 15px rgba(245, 185, 25, 0.2));
        }
        50% {
          opacity: 0.25;
          filter: drop-shadow(0 0 30px rgba(245, 185, 25, 0.4));
        }
      }

      /* ── Morphing Blob ── */
      .blob-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 160px;
        height: 160px;
        z-index: 0;
        pointer-events: none;
      }
      .morphing-blob {
        width: 100%;
        height: 100%;
        background: radial-gradient(
          ellipse,
          rgba(245, 185, 25, 0.08) 0%,
          transparent 70%
        );
        border-radius: 40% 60% 55% 45% / 55% 40% 60% 45%;
        animation: morph 12s ease-in-out infinite;
        filter: blur(40px);
      }
      @keyframes morph {
        0% {
          border-radius: 40% 60% 55% 45% / 55% 40% 60% 45%;
          transform: rotate(0deg) scale(1);
        }
        25% {
          border-radius: 55% 45% 40% 60% / 45% 55% 45% 55%;
          transform: rotate(90deg) scale(1.1);
        }
        50% {
          border-radius: 60% 40% 45% 55% / 40% 60% 55% 45%;
          transform: rotate(180deg) scale(1);
        }
        75% {
          border-radius: 45% 55% 60% 40% / 60% 45% 40% 60%;
          transform: rotate(270deg) scale(1.1);
        }
        100% {
          border-radius: 40% 60% 55% 45% / 55% 40% 60% 45%;
          transform: rotate(360deg) scale(1);
        }
      }

      /* ── Balance ── */
      .balance-display {
        text-align: center;
        padding: 16px 0;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 100%;
      }
      .balance-network {
        font-size: 13px;
        color: #00ff41;
        letter-spacing: 3px;
        margin-bottom: 8px;
        text-transform: uppercase;
      }
      .balance-block-info {
        font-size: 14px;
        color: #444;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }
      .balance-amount {
        font-size: 72px;
        font-weight: 800;
        color: #f5b919;
        font-variant-numeric: tabular-nums;
        text-shadow:
          0 0 40px rgba(245, 185, 25, 0.3),
          0 0 80px rgba(245, 185, 25, 0.1);
        letter-spacing: -2px;
        font-family: "JetBrains Mono", monospace;
        display: inline-flex;
        align-items: center;
        line-height: 1;
      }
      .balance-amount .digit {
        display: inline-block;
        animation: digit-reveal 0.6s ease-out forwards;
        opacity: 0;
        transform: translateY(20px);
      }
      .balance-cursor {
        display: inline-block;
        width: 3px;
        height: 56px;
        background: #f5b919;
        margin-left: 2px;
        animation: cursor-blink 1s step-end infinite;
        vertical-align: middle;
      }
      @keyframes cursor-blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      @keyframes digit-reveal {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .balance-label {
        font-size: 14px;
        color: #555;
        margin-top: 8px;
        letter-spacing: 4px;
        text-transform: uppercase;
      }

      /* Pool breakdown bars */
      .pool-bars {
        display: flex;
        width: 100%;
        height: 6px;
        margin-top: 12px;
        border: 0;
        overflow: hidden;
        gap: 1px;
      }
      .pool-bar {
        height: 100%;
        transition: width 0.6s ease;
      }
      .pool-bar.orchard {
        background: #f5b919;
      }
      .pool-bar.sapling {
        background: #3b82f6;
      }
      .pool-bar.transparent {
        background: #555;
      }

      .balance-pools {
        display: flex;
        gap: 6px;
        justify-content: center;
        margin-top: 8px;
      }
      .pool {
        text-align: center;
        padding: 8px 14px;
        background: rgba(10, 10, 18, 0.8);
        border: 1px solid #1a1a2e;
        flex: 1;
        transition: border-color 0.3s;
      }
      .pool:hover {
        border-color: rgba(245, 185, 25, 0.15);
      }
      .pool .pool-dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        margin-right: 3px;
        vertical-align: middle;
      }
      .pool .pool-dot.orchard {
        background: #f5b919;
      }
      .pool .pool-dot.sapling {
        background: #3b82f6;
      }
      .pool .pool-dot.transparent {
        background: #666;
      }
      .pool .amount {
        font-size: 18px;
        font-weight: 700;
        color: #e0e0e0;
        font-family: "JetBrains Mono", monospace;
      }
      .pool .name {
        font-size: 14px;
        color: #666;
        margin-top: 4px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      /* ── Address ── */
      .address-box {
        background: rgba(8, 8, 15, 0.9);
        border: 1px solid #1a1a2e;
        padding: 6px 10px;
        word-break: break-all;
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        color: #f5b919;
        cursor: pointer;
        position: relative;
        transition: all 0.3s ease;
        overflow: hidden;
      }
      .address-box::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(245, 185, 25, 0.04),
          transparent
        );
        transition: left 0.5s ease;
      }
      .address-box:hover::after {
        left: 100%;
      }
      .address-box:hover {
        background: rgba(13, 13, 24, 0.95);
        border-color: rgba(245, 185, 25, 0.4);
      }
      .address-prefix {
        color: #00ff41;
        margin-right: 4px;
        user-select: none;
      }
      .address-box .copy-hint {
        position: absolute;
        top: 4px;
        right: 8px;
        font-size: 13px;
        color: #333;
        transition: color 0.3s;
      }
      .address-box:hover .copy-hint {
        color: #666;
      }
      .address-label {
        font-size: 14px;
        color: #555;
        margin-bottom: 3px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: "JetBrains Mono", monospace;
        letter-spacing: 1px;
      }
      .address-label .tag {
        background: rgba(0, 255, 65, 0.1);
        color: #00ff41;
        padding: 1px 5px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.5px;
        border: 1px solid rgba(0, 255, 65, 0.2);
      }
      .address-label .pool-indicator {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        margin-right: 2px;
      }

      /* ── Send Form ── */
      .send-form {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .send-form label {
        font-size: 14px;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 1px;
        display: block;
        font-family: "JetBrains Mono", monospace;
      }
      .send-form input,
      .send-form textarea {
        background: rgba(8, 8, 15, 0.9);
        border: 1px solid #1a1a2e;
        padding: 7px 10px;
        color: #e0e0e0;
        font-family: "JetBrains Mono", monospace;
        font-size: 14px;
        outline: none;
        transition:
          border-color 0.3s,
          box-shadow 0.3s;
        width: 100%;
      }
      .send-form input:focus,
      .send-form textarea:focus {
        border-color: rgba(245, 185, 25, 0.4);
        box-shadow: 0 0 12px rgba(245, 185, 25, 0.06);
      }
      .send-form textarea {
        resize: none;
        height: 38px;
      }

      /* ── Buttons ── */
      .btn {
        padding: 9px 16px;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        font-family: "JetBrains Mono", monospace;
        letter-spacing: 1px;
      }
      .btn-primary {
        background: #f5b919;
        color: #08080f;
      }
      .btn-primary:hover {
        box-shadow: 0 0 20px rgba(245, 185, 25, 0.3);
        transform: translateY(-1px);
      }
      .btn-primary:active {
        transform: translateY(0);
      }
      .btn-primary:disabled {
        opacity: 0.3;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      .btn-cursor {
        animation: cursor-blink 1s step-end infinite;
        margin-right: 4px;
      }
      .btn-secondary {
        background: rgba(26, 26, 46, 0.5);
        color: #666;
        border: 1px solid #1a1a2e;
        border-radius: 4px;
      }
      .btn-secondary:hover {
        background: rgba(34, 34, 54, 0.7);
        color: #999;
        border-color: rgba(245, 185, 25, 0.12);
      }

      /* ── Send Shockwave ── */
      .shockwave-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1000;
        pointer-events: none;
        display: none;
      }
      .shockwave-overlay.active {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .shockwave-ring {
        position: absolute;
        border: 1px solid rgba(245, 185, 25, 0.5);
        border-radius: 50%;
        animation: shockwave-expand 1.5s ease-out forwards;
        opacity: 0;
      }
      @keyframes shockwave-expand {
        0% {
          width: 10px;
          height: 10px;
          opacity: 0.8;
        }
        100% {
          width: 600px;
          height: 600px;
          opacity: 0;
        }
      }
      .shockwave-text {
        position: relative;
        z-index: 1;
        font-size: 14px;
        font-weight: 700;
        color: #f5b919;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-family: "JetBrains Mono", monospace;
        animation: proof-pulse 1s ease-in-out infinite;
      }
      @keyframes proof-pulse {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
          text-shadow: 0 0 20px rgba(245, 185, 25, 0.5);
        }
      }

      /* ── Tabs ── */
      .tabs {
        display: flex;
        gap: 2px;
        margin-bottom: 8px;
      }
      .tab {
        padding: 5px 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        background: transparent;
        border: 1px solid transparent;
        color: #555;
        transition: all 0.3s;
        font-family: "JetBrains Mono", monospace;
        letter-spacing: 1px;
        text-transform: uppercase;
      }
      .tab:hover {
        color: #888;
        border-color: #1a1a2e;
      }
      .tab.active {
        background: #f5b919;
        color: #08080f;
        border-color: transparent;
      }

      /* ── Transactions & Notes ── */
      .tx-list,
      .notes-list {
        display: flex;
        flex-direction: column;
        gap: 1px;
        overflow-y: auto;
        max-height: calc(100vh - 320px);
      }
      .tx-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 16px;
        font-size: 13px;
        border: 1px solid transparent;
        transition: all 0.3s;
        font-family: "JetBrains Mono", monospace;
      }
      .tx-item:nth-child(odd) {
        background: rgba(8, 8, 15, 0.6);
      }
      .tx-item:nth-child(even) {
        background: rgba(13, 13, 24, 0.4);
      }
      .tx-item:hover {
        border-color: rgba(245, 185, 25, 0.08);
        background: rgba(18, 18, 30, 0.8);
      }
      .tx-item .txid {
        font-family: "JetBrains Mono", monospace;
        color: #444;
        max-width: 160px;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 14px;
      }
      .tx-item .value {
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .tx-item .value.positive {
        color: #00ff41;
      }
      .tx-item .value.negative {
        color: #f87171;
      }

      .note-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px 8px;
        border: 1px solid transparent;
        transition: all 0.3s;
        font-family: "JetBrains Mono", monospace;
      }
      .note-item:nth-child(odd) {
        background: rgba(8, 8, 15, 0.6);
      }
      .note-item:nth-child(even) {
        background: rgba(13, 13, 24, 0.4);
      }
      .note-item:hover {
        border-color: rgba(245, 185, 25, 0.06);
      }
      .note-item .pool-tag {
        font-size: 14px;
        padding: 2px 6px;
        font-weight: 700;
        letter-spacing: 1px;
        font-family: "JetBrains Mono", monospace;
      }
      .note-item .pool-tag.orchard {
        background: rgba(245, 185, 25, 0.15);
        color: #f5b919;
        border: 1px solid rgba(245, 185, 25, 0.3);
      }
      .note-item .pool-tag.sapling {
        background: rgba(59, 130, 246, 0.1);
        color: #3b82f6;
        border: 1px solid rgba(59, 130, 246, 0.2);
      }
      .note-pool-dot {
        display: inline-block;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        margin-right: 3px;
        vertical-align: middle;
      }
      .note-pool-dot.orchard {
        background: #f5b919;
      }
      .note-pool-dot.sapling {
        background: #3b82f6;
      }

      /* ── Loading ── */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 14px;
        color: #333;
        font-size: 13px;
        font-family: "JetBrains Mono", monospace;
        letter-spacing: 1px;
      }
      .spinner {
        width: 12px;
        height: 12px;
        border: 2px solid #1a1a2e;
        border-top-color: #f5b919;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Toast ── */
      .toast {
        position: fixed;
        bottom: 32px;
        right: 20px;
        background: rgba(8, 8, 15, 0.95);
        border: 1px solid #00ff41;
        color: #00ff41;
        padding: 10px 16px;
        font-size: 13px;
        display: none;
        z-index: 2000;
        font-family: "JetBrains Mono", monospace;
        letter-spacing: 1px;
        animation: toast-in 0.3s ease-out;
      }
      .toast.error {
        background: rgba(8, 8, 15, 0.95);
        border-color: #f87171;
        color: #f87171;
      }
      .toast.show {
        display: block;
      }
      @keyframes toast-in {
        0% {
          transform: translateY(20px);
          opacity: 0;
        }
        100% {
          transform: translateY(0);
          opacity: 1;
        }
      }

      /* ── Status Bar ── */
      .status-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 22px;
        background: rgba(8, 8, 15, 0.98);
        border-top: 1px solid #1a1a2e;
        z-index: 100;
        display: flex;
        align-items: center;
        padding: 0 16px;
        font-size: 14px;
        color: #00ff41;
        font-family: "JetBrains Mono", monospace;
        letter-spacing: 1px;
        gap: 12px;
      }
      .status-bar .sep {
        color: #1a1a2e;
      }
      .status-bar .dim {
        color: #333;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar {
        width: 3px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(245, 185, 25, 0.12);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(245, 185, 25, 0.25);
      }

      /* ── Tooltip ── */
      .addr-truncated {
        position: relative;
      }
      .addr-truncated .addr-tooltip {
        display: none;
        position: absolute;
        bottom: 100%;
        left: 0;
        background: rgba(8, 8, 15, 0.98);
        border: 1px solid #f5b919;
        color: #f5b919;
        padding: 14px 16px;
        font-size: 14px;
        word-break: break-all;
        max-width: 400px;
        z-index: 50;
        font-family: "JetBrains Mono", monospace;
        margin-bottom: 4px;
      }
      .addr-truncated:hover .addr-tooltip {
        display: block;
      }
    </style>
  </head>
  <body>

        <!-- Notes & Transactions -->

    <!-- Status Bar -->
    <div class="status-bar" id="status-bar">
      <span id="sb-block" class="dim">BLOCK ---</span>
      <span class="sep">|</span>
      <span id="sb-network" class="dim">NETWORK ---</span>
      <span class="sep">|</span>
      <span>HALO2 ACTIVE</span>
      <span class="sep">|</span>
      <span id="sb-sync">SYNC: PENDING</span>
      <span class="sep">|</span>
      <span id="sb-peers">PEERS: ---</span>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      /* ════════════════════════════════════════════
         VISUAL EFFECTS
         ════════════════════════════════════════════ */

      let mouseX = 0,
        mouseY = 0;

      // ── Matrix Rain ──
      (function initMatrix() {
        const canvas = document.getElementById("matrix");
        const ctx = canvas.getContext("2d");
        const chars = "01ZEC01ZEC01010101ZEC";
        let columns, drops;

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          const fontSize = 14;
          columns = Math.floor(canvas.width / fontSize);
          drops = new Array(columns).fill(1);
          for (let i = 0; i < columns; i++) {
            drops[i] = (Math.random() * canvas.height) / fontSize;
          }
        }
        resize();
        window.addEventListener("resize", resize);

        function draw() {
          ctx.fillStyle = "rgba(8, 8, 15, 0.06)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.font = "12px JetBrains Mono, monospace";

          for (let i = 0; i < columns; i++) {
            const char = chars[Math.floor(Math.random() * chars.length)];
            const x = i * 14;
            const y = drops[i] * 14;

            // Green-yellow tint with very low opacity
            const brightness = Math.random() * 0.12 + 0.03;
            const isYellow = Math.random() > 0.7;
            if (isYellow) {
              ctx.fillStyle = `rgba(245, 185, 25, ${brightness})`;
            } else {
              ctx.fillStyle = `rgba(0, 255, 65, ${brightness})`;
            }

            ctx.fillText(char, x, y);

            if (y > canvas.height && Math.random() > 0.985) {
              drops[i] = 0;
            }
            drops[i] += 0.3 + Math.random() * 0.2;
          }
          requestAnimationFrame(draw);
        }
        draw();
      })();

      // ── Mouse Tracking ──
      document.addEventListener("mousemove", (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      // ── Eyes Follow Mouse ──
      function updateEyes() {
        const eyes = [
          {
            eye: document.getElementById("eye-left"),
            pupil: document.getElementById("pupil-left"),
          },
          {
            eye: document.getElementById("eye-right"),
            pupil: document.getElementById("pupil-right"),
          },
        ];

        for (const { eye, pupil } of eyes) {
          const rect = eye.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const dx = mouseX - cx;
          const dy = mouseY - cy;
          const angle = Math.atan2(dy, dx);
          const dist = Math.min(18, Math.hypot(dx, dy) * 0.02);
          const px = Math.cos(angle) * dist;
          const py = Math.sin(angle) * dist;
          pupil.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`;
        }
        requestAnimationFrame(updateEyes);
      }
      updateEyes();

      // ── Glitch Effect ──
      function triggerGlitch() {
        const el = document.getElementById("glitch-title");
        el.classList.add("glitching");
        setTimeout(() => el.classList.remove("glitching"), 300);
        setTimeout(triggerGlitch, 5000 + Math.random() * 3000);
      }
      setTimeout(triggerGlitch, 2000);

      // ── Card 3D Tilt ──
      document.querySelectorAll("[data-tilt]").forEach((card) => {
        card.addEventListener("mousemove", (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          const rotateX = ((y - centerY) / centerY) * -3;
          const rotateY = ((x - centerX) / centerX) * 3;
          card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
          card.style.setProperty("--mouse-x", x + "px");
          card.style.setProperty("--mouse-y", y + "px");
        });
        card.addEventListener("mouseleave", () => {
          card.style.transform = "perspective(800px) rotateX(0) rotateY(0)";
        });
      });

      // ── Balance Digit Cascade ──
      function cascadeDigits(container, text) {
        container.innerHTML = "";
        for (let i = 0; i < text.length; i++) {
          const span = document.createElement("span");
          span.className = "digit";
          span.style.animationDelay = i * 0.05 + "s";
          span.textContent = text[i];

          // Slot machine effect: show random chars first
          const chars = "0123456789.";
          let count = 0;
          const maxIterations = 6 + Math.floor(Math.random() * 4);
          const interval = setInterval(() => {
            if (count < maxIterations) {
              span.textContent =
                chars[Math.floor(Math.random() * chars.length)];
              count++;
            } else {
              span.textContent = text[i];
              clearInterval(interval);
            }
          }, 40);

          container.appendChild(span);
        }
        // Add blinking cursor
        const cursor = document.createElement("span");
        cursor.className = "balance-cursor";
        container.appendChild(cursor);
      }

      // ── Address Decryption Effect ──
      function decryptEffect(el) {
        const original = el.getAttribute("data-addr");
        if (!original) return;
        const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
        let iteration = 0;
        const textSpan = el.querySelector(".addr-text");
        if (!textSpan) return;
        const interval = setInterval(() => {
          textSpan.textContent = original
            .split("")
            .map((char, idx) => {
              if (idx < iteration) return char;
              return chars[Math.floor(Math.random() * chars.length)];
            })
            .join("");
          iteration += Math.ceil(original.length / 10);
          if (iteration >= original.length) {
            textSpan.textContent = original;
            clearInterval(interval);
          }
        }, 30);
      }

      // ── Shockwave Animation ──
      function showShockwave() {
        const overlay = document.getElementById("shockwave-overlay");
        overlay.classList.add("active");

        // Remove old rings
        overlay.querySelectorAll(".shockwave-ring").forEach((r) => r.remove());

        for (let i = 0; i < 5; i++) {
          setTimeout(() => {
            const ring = document.createElement("div");
            ring.className = "shockwave-ring";
            ring.style.left = "50%";
            ring.style.top = "50%";
            ring.style.marginLeft = "-5px";
            ring.style.marginTop = "-5px";
            overlay.appendChild(ring);
            setTimeout(() => ring.remove(), 1500);
          }, i * 300);
        }
      }

      function hideShockwave() {
        document.getElementById("shockwave-overlay").classList.remove("active");
      }

      /* ════════════════════════════════════════════
         WALLET LOGIC (unchanged API calls)
         ════════════════════════════════════════════ */

      let accountId = 1;

      function showToast(msg, isError = false) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = "toast show" + (isError ? " error" : "");
        setTimeout(() => (t.className = "toast"), 3000);
      }

      function showTab(name, el) {
        document.getElementById("notes-tab").style.display =
          name === "notes" ? "block" : "none";
        document.getElementById("txs-tab").style.display =
          name === "txs" ? "block" : "none";
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        el.classList.add("active");
      }

      function updateStatusBar(chain, blocks) {
        document.getElementById("sb-block").textContent =
          "BLOCK " + (blocks ? blocks.toLocaleString() : "---");
        document.getElementById("sb-block").className = blocks ? "" : "dim";
        document.getElementById("sb-network").textContent = chain
          ? chain.toUpperCase() + "NET"
          : "NETWORK ---";
        document.getElementById("sb-network").className = chain ? "" : "dim";
        document.getElementById("sb-sync").textContent = blocks
          ? "SYNC: OK"
          : "SYNC: PENDING";
        document.getElementById("sb-peers").textContent = blocks
          ? "PEERS: CONNECTED"
          : "PEERS: ---";
      }

      async function init() {
        // Check chain
        try {
          const chain = await fetch("/api/chain").then((r) => r.json());
          document.getElementById("status").innerHTML =
            '<span class="dot green"></span> ' +
            chain.chain +
            "net \u00B7 Block " +
            chain.blocks.toLocaleString();
          document.getElementById("status").className = "status connected";
          updateStatusBar(chain.chain, chain.blocks);
        } catch {
          document.getElementById("status").innerHTML =
            '<span class="dot red"></span> NODE OFFLINE';
          updateStatusBar(null, null);
          return;
        }

        // Get or create account
        try {
          const acc = await fetch("/api/account", { method: "POST" }).then(
            (r) => r.json(),
          );
          accountId = acc.accountId;
        } catch (e) {
          showToast("Failed to get account: " + e.message, true);
        }

        loadBalance();
        loadAddresses();
        loadNotes();
        loadTransactions();
      }

      async function loadBalance() {
        try {
          const bal = await fetch("/api/balance/" + accountId).then((r) =>
            r.json(),
          );
          const total = parseFloat(bal.total || "0");
          const orchard = parseFloat(bal.orchard || "0");
          const sapling = parseFloat(bal.sapling || "0");
          const transparent = parseFloat(bal.transparent || "0");

          // Compute percentages for bar
          const sum = orchard + sapling + transparent;
          const oPct = sum > 0 ? (orchard / sum) * 100 : 33;
          const sPct = sum > 0 ? (sapling / sum) * 100 : 33;
          const tPct = sum > 0 ? (transparent / sum) * 100 : 34;

          const section = document.getElementById("balance-section");
          section.innerHTML = `
            <div class="blob-container"><div class="morphing-blob"></div></div>
            <div class="balance-network">TESTNET // SHIELDED VAULT</div>
            <div class="balance-amount" id="balance-digits"></div>
            <div class="balance-label">ZEC TOTAL BALANCE</div>
            <div class="pool-bars">
              <div class="pool-bar orchard" style="width:${oPct}%"></div>
              <div class="pool-bar sapling" style="width:${sPct}%"></div>
              <div class="pool-bar transparent" style="width:${tPct}%"></div>
            </div>
            <div class="balance-pools">
              <div class="pool"><div class="amount"><span class="pool-dot orchard"></span>${orchard.toFixed(4)}</div><div class="name">ORCHARD</div></div>
              <div class="pool"><div class="amount"><span class="pool-dot sapling"></span>${sapling.toFixed(4)}</div><div class="name">SAPLING</div></div>
              <div class="pool"><div class="amount"><span class="pool-dot transparent"></span>${transparent.toFixed(4)}</div><div class="name">TRANSPARENT</div></div>
            </div>
          `;
          cascadeDigits(
            document.getElementById("balance-digits"),
            total.toFixed(4),
          );
        } catch {
          document.getElementById("balance-section").innerHTML =
            '<div class="blob-container"><div class="morphing-blob"></div></div><div class="balance-amount">\u2014</div><div class="balance-label">UNABLE TO LOAD</div>';
        }
      }

      function truncateAddr(addr) {
        if (!addr || addr.length < 24) return addr;
        return addr.slice(0, 12) + "..." + addr.slice(-8);
      }

      async function loadAddresses() {
        try {
          const addrs = await fetch("/api/addresses/" + accountId).then((r) =>
            r.json(),
          );
          let html = "";
          if (addrs.ua) {
            html +=
              '<div style="margin-bottom:6px"><div class="address-label"><span class="pool-indicator" style="background:#F5B919"></span>UNIFIED ADDRESS <span class="tag">RECOMMENDED</span></div>';
            html +=
              '<div class="address-box addr-truncated" data-addr="' +
              addrs.ua +
              '" onclick="copyAddr(this)" onmouseenter="decryptEffect(this)"><span class="address-prefix">ᙇ</span><span class="addr-text">' +
              addrs.ua +
              '</span><span class="copy-hint">CLICK TO COPY</span><div class="addr-tooltip">' +
              addrs.ua +
              "</div></div></div>";
          }
          if (addrs.orchard) {
            html +=
              '<div style="margin-bottom:6px"><div class="address-label"><span class="pool-indicator" style="background:#F5B919"></span>ORCHARD <span class="tag">HALO2</span></div>';
            html +=
              '<div class="address-box addr-truncated" data-addr="' +
              addrs.orchard +
              '" onclick="copyAddr(this)" onmouseenter="decryptEffect(this)"><span class="address-prefix">ᙇ</span><span class="addr-text">' +
              addrs.orchard +
              '</span><span class="copy-hint">CLICK TO COPY</span><div class="addr-tooltip">' +
              addrs.orchard +
              "</div></div></div>";
          }
          if (addrs.transparent) {
            html +=
              '<div style="margin-bottom:6px"><div class="address-label"><span class="pool-indicator" style="background:#666"></span>TRANSPARENT</div>';
            html +=
              '<div class="address-box addr-truncated" style="border-color:#1a1a2e;color:#666" data-addr="' +
              addrs.transparent +
              '" onclick="copyAddr(this)" onmouseenter="decryptEffect(this)"><span class="address-prefix" style="color:#555">ᙇ</span><span class="addr-text">' +
              addrs.transparent +
              '</span><span class="copy-hint">CLICK TO COPY</span><div class="addr-tooltip">' +
              addrs.transparent +
              "</div></div></div>";
          }
          html +=
            '<button class="btn btn-secondary" style="margin-top:6px;width:100%" onclick="newAddresses()">GENERATE NEW ADDRESSES</button>';
          document.getElementById("addresses-section").innerHTML = html;
        } catch {
          document.getElementById("addresses-section").innerHTML =
            '<div style="color:#333;font-size:10px">UNABLE TO LOAD ADDRESSES</div>';
        }
      }

      async function loadNotes() {
        try {
          const notes = await fetch("/api/notes/" + accountId).then((r) =>
            r.json(),
          );
          if (!notes.length) {
            document.getElementById("notes-tab").innerHTML =
              '<div style="color:#333;text-align:center;padding:14px;font-size:10px;letter-spacing:1px">NO SHIELDED NOTES YET</div>';
            return;
          }
          let html = '<div class="notes-list">';
          for (const n of notes) {
            const pool = n.pool === 2 ? "orchard" : "sapling";
            html += `<div class="note-item">
              <span><span class="note-pool-dot ${pool}"></span><span class="pool-tag ${pool}">${pool.toUpperCase()}</span></span>
              <span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#ccc">${parseFloat(n.value).toFixed(4)} ZEC</span>
            </div>`;
          }
          html += "</div>";
          document.getElementById("notes-tab").innerHTML = html;
        } catch {
          document.getElementById("notes-tab").innerHTML =
            '<div style="color:#333;font-size:10px">UNABLE TO LOAD</div>';
        }
      }

      async function loadTransactions() {
        try {
          const txs = await fetch("/api/transactions/" + accountId).then((r) =>
            r.json(),
          );
          if (!txs.length) {
            document.getElementById("txs-tab").innerHTML =
              '<div style="color:#333;text-align:center;padding:14px;font-size:10px;letter-spacing:1px">NO TRANSACTIONS YET</div>';
            return;
          }
          let html = '<div class="tx-list">';
          for (const tx of txs.slice(0, 20)) {
            const val = parseFloat(tx.value);
            const cls = val >= 0 ? "positive" : "negative";
            html += `<div class="tx-item">
              <div><div class="txid">${tx.txid}</div><div style="font-size:8px;color:#333;margin-top:1px;letter-spacing:1px">BLOCK ${tx.height}</div></div>
              <div class="value ${cls}">${val >= 0 ? "+" : ""}${val.toFixed(4)} ZEC</div>
            </div>`;
          }
          html += "</div>";
          document.getElementById("txs-tab").innerHTML = html;
        } catch {
          document.getElementById("txs-tab").innerHTML =
            '<div style="color:#333;font-size:10px">UNABLE TO LOAD</div>';
        }
      }

      function copyAddr(el) {
        const text =
          el.getAttribute("data-addr") ||
          el.textContent.replace("CLICK TO COPY", "").replace("ᙇ", "").trim();
        navigator.clipboard.writeText(text);
        showToast("ADDRESS COPIED!");
      }

      async function newAddresses() {
        try {
          await fetch("/api/addresses/" + accountId + "/new", {
            method: "POST",
          });
          loadAddresses();
          showToast("NEW ADDRESSES GENERATED!");
        } catch (e) {
          showToast("FAILED: " + e.message, true);
        }
      }

      async function sendShielded() {
        const to = document.getElementById("send-to").value.trim();
        const amount = document.getElementById("send-amount").value.trim();
        const memo = document.getElementById("send-memo").value.trim();

        if (!to || !amount) {
          showToast("ENTER ADDRESS AND AMOUNT", true);
          return;
        }

        const btn = document.getElementById("send-btn");
        btn.disabled = true;
        btn.textContent = "GENERATING HALO2 PROOF...";

        // Show shockwave
        showShockwave();

        try {
          const res = await fetch("/api/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ accountId, to, amount, memo, srcPools: 4 }),
          }).then((r) => r.json());

          hideShockwave();

          if (res.error) throw new Error(res.error);

          showToast("SENT! TXID: " + (res.txid || "").slice(0, 16) + "...");
          document.getElementById("send-to").value = "";
          document.getElementById("send-amount").value = "";
          document.getElementById("send-memo").value = "";

          // Refresh
          setTimeout(() => {
            loadBalance();
            loadNotes();
            loadTransactions();
          }, 3000);
        } catch (e) {
          hideShockwave();
          showToast("SEND FAILED: " + e.message, true);
        }

        btn.disabled = false;
        btn.innerHTML =
          '<span class="btn-cursor">&gt;</span> BROADCAST [Orchard/Halo2]';
      }

      init();
    </script>
  </body>
</html>
